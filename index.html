<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Everyday Manna</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Everyday Manna</h1>
        <p class="subtitle">
            Daily Hope & Bible Encouragement
        </p>

        <div class="topics">
            <button onclick="showVerse('hope')">Hope</button>
            <button onclick="showVerse('fear')">Fear</button>
            <button onclick="showVerse('anxiety')">Anxiety</button>
            <button onclick="showVerse('faith')">Faith</button>
            <button onclick="showVerse('love')">Love</button>
            <button onclick="showVerse('strength')">Strength</button>
        </div>

        <div id="verse-box">
            <h2>Select a topic</h2>
            <p>Your verse and encouragement will appear here.</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
