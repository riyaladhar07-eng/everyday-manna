<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Everyday Manna</title>

    <link rel="manifest" href="manifest.json">

    <meta name="theme-color" content="#7a5c3e">

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <!-- HERO -->

    <div class="hero">

        <div class="hero-text">

            <h1>Everyday Manna ✨</h1>

            <p>God is with you today</p>

        </div>

        <div class="profile-icon">🙏</div>

    </div>

    <!-- DARK MODE -->

    <button onclick="toggleDarkMode()">
        🌙 Dark Mode
    </button>

    <br><br>

    <!-- SEARCH -->

    <input type="text"
           id="searchInput"
           placeholder="Search category..."
           onkeyup="searchTopics()">

    <!-- DAILY VERSE -->

    <div class="daily-verse">

        <h3>Daily Verse</h3>

        <p id="dailyVerseText"></p>

        <button onclick="generateDailyVerse()">
            New Verse
        </button>

    </div>

    <!-- BIBLE SEARCH -->

    <div class="daily-verse">

        <h3>Search Bible Verse 📖</h3>

        <input type="text"
               id="bibleInput"
               placeholder="Example: John 3:16">

        <br><br>

        <button onclick="searchBibleVerse()">
            Search Verse
        </button>

        <div id="bibleResult"></div>

    </div>

    <!-- BIBLE BOOK NAVIGATION -->

    <div class="daily-verse">

        <h3>📖 Bible Book Navigation</h3>

        <button onclick="showBooks('old')">
            Old Testament
        </button>

        <button onclick="showBooks('new')">
            New Testament
        </button>

        <div id="bookList"></div>

    </div>

    <!-- TOPICS -->

    <h2>Choose Category</h2>

    <div class="home-grid">

        <div class="card" onclick="openCategory('faith')">
            ✝️ Faith & Trust
        </div>

        <div class="card" onclick="openCategory('students')">
            🎓 Students & Youth
        </div>

        <div class="card" onclick="openCategory('marriage')">
            💍 Marriage & Family
        </div>

        <div class="card" onclick="openCategory('business')">
            💼 Business & Finance
        </div>

        <div class="card" onclick="openCategory('health')">
            ❤️ Health & Healing
        </div>

        <div class="card" onclick="openCategory('emotions')">
            🌿 Emotional Support
        </div>

    </div>

    <!-- CONTENT -->

    <div id="subtopic-box"></div>

</div>

<script src="script.js"></script>

</body>
</html>
