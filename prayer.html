<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Prayer Room</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="top-bar">
    🙏 Prayer Room
  </div>

  <div class="prayer-card">

    <h2>Daily Prayer</h2>

    <p>
      Lord, guide me today with wisdom,
      peace, strength, and faith.
    </p>

  </div>

  <div class="prayer-card">

    <h2>Prayer Journal</h2>

    <textarea placeholder="Write your prayer here..."></textarea>

    <br><br>

    <button>
      Save Prayer
    </button>

  </div>

</body>
</html>
